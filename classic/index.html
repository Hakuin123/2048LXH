	var ua = window.navigator.userAgent.toLowerCase();

		bg.style.display = "block";
	}
} 
function fadeWechat(){ 
	var ua = window.navigator.userAgent.toLowerCase(); 
	if(ua.match(/MicroMessenger/i) == 'micromessenger'){ 
		var bg = document.getElementById("bg");
		bg.style.display = "none";
	}
}
